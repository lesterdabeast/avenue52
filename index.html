<!DOCTYPE html>
<html>
<head>
    <title>Avenue52</title>

    <!-- Website tab icon -->
    <link rel="icon" type="image/png" href="https://i.imghippo.com/files/bPc8349ZRY.png">

    <!-- Model viewer script -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        body {
            background-color: #2596be;
            color: black;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: right;
        }
        img {
            display: block;
            margin: 20px auto;
        }
        .letters-vertical {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-size: 3em;
            font-weight: bold;
            color: white;
            gap: 10px;
            position: fixed;
            top: 100px;
            left: 20px;
        }
        model-viewer {
            display: block;
            margin: 50px auto 20px auto;
        }
        .buttons {
            margin: 30px auto;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .buttons a {
            display: inline-block;
            padding: 10px 20px;
            background-color: white;
            color: black;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
        }
        .buttons a:hover {
            background-color: #ddd;
        }
    </style>
</head>

<body>

<h1>AVENUE52</h1>

<p>Magazine Title: Home Visuals</p>

<img src="https://i.imghippo.com/files/bPc8349ZRY.png" 
     alt="Magazine logo"
     width="250"
     height="250">

<!-- 3D magazine -->
<model-viewer
    src="avenue51pg1.glb"
    camera-controls
    auto-rotate
    style="width:800px; height:800px;">
</model-viewer>

<model-viewer
    src="avenue51pg2.glb"
    camera-controls
    auto-rotate
    style="width:800px; height:800px;">
</model-viewer>
<model-viewer
    src="avenue51pg3.glb"
    camera-controls
    auto-rotate
    style="width:800px; height:800px;">
</model-viewer>
<model-viewer
    src="avenue51pg4.glb"
    camera-controls
    auto-rotate
    style="width:800px; height:800px;">
</model-viewer>
<model-viewer
    src="avenue51pg13.glb"
    camera-controls
    auto-rotate
    style="width:800px; height:800px;">
</model-viewer>
<model-viewer
    src="avenue51pg14.glb"
    camera-controls
    auto-rotate
    style="width:800px; height:800px;">
</model-viewer>

<!-- Buttons -->
<div class="buttons">
    <a href="https://www.instagram.com/only_LSS" target="_blank">LinkedIN</a>
    <a href="https://trapcat1440.github.io/VoyagerTheGame/" target="_blank">Order Print</a>
</div>

</body>
</html>
